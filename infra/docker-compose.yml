services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: uber-postgres
    environment:
      POSTGRES_DB: uberpoc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: uber-redis
    ports:
      - "6379:6379"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: uber-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms256m"
    deploy:
      resources:
        limits:
          memory: 400m

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: uber-kafka-ui
    profiles: [obs]
    depends_on: [kafka]
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # ── Observability stack (run: docker compose --profile obs up -d) ──────────
  prometheus:
    image: prom/prometheus:latest
    container_name: uber-prometheus
    profiles: [obs]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 128m

  loki:
    image: grafana/loki:2.9.0
    container_name: uber-loki
    profiles: [obs]
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    deploy:
      resources:
        limits:
          memory: 128m

  promtail:
    image: grafana/promtail:2.9.0
    container_name: uber-promtail
    profiles: [obs]
    volumes:
      - /tmp:/var/log/uber
      - ./promtail.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on: [loki]
    deploy:
      resources:
        limits:
          memory: 64m

  grafana:
    image: grafana/grafana:latest
    container_name: uber-grafana
    profiles: [obs]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    depends_on: [prometheus, loki]
    deploy:
      resources:
        limits:
          memory: 128m
